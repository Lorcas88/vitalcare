{% load django_bootstrap5 %}

<div
  class="modal fade"
  id="modal-delete"
  tabindex="-1"
  aria-labelledby="modal-label"
  aria-hidden="true"
>
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="modal-label">Acción irreversible</h5>
        <button
          type="button"
          class="btn-close"
          data-bs-dismiss="modal"
          aria-label="Close"
        ></button>
      </div>
      <div class="modal-body">
        <p>¿Estás seguro de eliminar este registro?</p>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
          Cancelar
        </button>
        <!-- prettier-ignore -->
        <form method="post">
          {% csrf_token %} 
          {% bootstrap_button "Eliminar" button_type="submit" button_class="btn-danger" %}
        </form>
      </div>
    </div>
  </div>
</div>
